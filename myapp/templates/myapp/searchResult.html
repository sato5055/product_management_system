
<!DOCTYPE html>
<html>
<head>
</head>
<body>
    <h1>キーワード"{{search}}" カテゴリ"{{category_name}}"の検索結果</h1>
    <table border=1>
        <tr>
            <th>商品名</th>
            <th>商品の色</th>
            <th>メーカー名</th>
            <th>価格</th>
        </tr>
        {%for item in shopping_item_list %}
        <tr>
            <td><a href="URL">{{item.name}}</a></td>
            <td>{{item.color}}</td>
            <td>{{item.manufacturer}}</td>
            <td>{{item.price}}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="/index/">商品検索</a>へ
    
</body>
</html>
